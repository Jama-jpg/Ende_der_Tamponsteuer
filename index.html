<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Österreichs Weg zur 0% Tamponsteuer</title>
  <!-- Disable browser scroll restoration BEFORE anything else loads -->
  <script>if (history.scrollRestoration) history.scrollRestoration = 'manual'; window.scrollTo(0, 0);</script>
  <link rel="stylesheet" href="https://use.typekit.net/wdo1lyc.css" />
</head>
<body>
  <!-- The engine (src/main.js) injects the stage, scroll sections and text
       overlays into #app at boot. Keep this shell intentionally empty. -->
  <!-- Mobile / tablet notice — hidden on desktop via CSS -->
  <div id="mobile-notice">
    <svg class="notice-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="8" y="4" width="48" height="36" rx="4" stroke="#531416" stroke-width="3.5"/>
      <rect x="20" y="44" width="24" height="14" rx="3" stroke="#531416" stroke-width="3.5"/>
      <line x1="8" y1="36" x2="56" y2="36" stroke="#531416" stroke-width="3.5"/>
      <line x1="26" y1="40" x2="38" y2="40" stroke="#531416" stroke-width="3.5"/>
    </svg>
    <p class="notice-title">Nur für Desktop</p>
    <p class="notice-body">
      Diese interaktive Story ist für große Bildschirme optimiert.<br>
      Bitte öffne die Seite auf einem Desktop- oder Laptop-Computer.
    </p>
  </div>

  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
